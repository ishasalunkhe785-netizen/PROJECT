<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Dashboard | Build My Dwelling</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f4f4; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #b38b59; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; } 
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #1a1a1a; color: white; }
        .login-box { text-align: center; padding: 50px; }
        input { padding: 10px; width: 250px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #b38b59; color: white; border: none; cursor: pointer; border-radius: 4px; }
        #dashboard { display: none; } 
    </style>
</head>
<body>
    
    <div class="container">
        <!-- Login Section -->
        <div id="login-section" class="login-box">
            <h1>Owner Access</h1>
            <p>Please enter the admin password to view inquiries:</p>
            <input type="Isha785" id="admin-pass" placeholder="Enter Password">
            <a href="http://localhost\Home\admin.html"></a>
                <form action="home1.php" method="POST">
            <button onclick="loadData()">Access Dashboard</button>
        </div>

        <!-- Data Section (Hidden by default) -->
        <div id="dashboard">
            <h1>Project Inquiries</h1>
            <button onclick="location.reload()" style="float:right; background:#333;">Logout</button>
            <table id="inquiry-table" name="name", name="email", name="type", name="message">
                <thead>
                    <tr>
                        <th name="id">ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Type</th>
                        <th>Message</th>
                        <th name="date">Date</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>

        <!--<form action="https://formspree.io/f/inquiry-table" method="POST">
            <input type="password" name="Isha" placeholder="Enter Password">
            <button type="submit">Add User</button>
        </form> -->
    </form>
    <script>
        async function loadData() {
            const password = document.getElementById('admin-pass').value;

            try {
                const response = await fetch('http://localhost:3307/api/admin/view-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Hide login, show dashboard
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';

                    // Populate table
                    const tableBody = document.getElementById('table-body');
                    tableBody.innerHTML = ''; // Clear previous
                    
                    data.forEach(item => {
                        const row = `<tr>
                            <td>${item.id}</td>
                            <td>${item.name}</td>
                            <td>${item.email}</td>
                            <td>${item.project_type}</td>
                            <td>${item.message}</td>
                            <td>${new Date(item.created_at).toLocaleDateString()}</td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    });
                } else {
                    alert(data.error);
                }
            } catch (error) {
                alert("Could not connect to server");
            }
        }

        
    </script>
</body>
</html>
